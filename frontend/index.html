<!DOCTYPE html>
<html>
<head>
    
<meta charset="UTF-8">
<title>Recruitment Intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

</head>
<body>
<div class="wrap">

  <div class="eyebrow">AI-Powered Screening</div>
  <h1>Recruitment Intelligence</h1>
  <p class="subtitle">Upload a resume and a job description — get a match score, skill gaps, and interview questions in seconds.</p>

  <form id="uploadForm" class="card">
    <label>Resume</label>
    <div class="dropzone" id="dropzone" tabindex="0">
      <input type="file" id="resumeFile" accept=".pdf">
      <div class="dz-icon">📄</div>
      <div class="dz-text">Drop a PDF here, or click to browse</div>
      <div class="dz-filename" id="dzFilename"></div>
    </div>

    <label for="jobDescription">Job Description</label>
    <textarea id="jobDescription" placeholder="Paste the job description here..." required></textarea>

    <button type="submit" class="submit-btn" id="submitBtn">Analyze Resume</button>
  </form>

  <div id="results"></div>

</div>

<script src="script.js" defer></script>
</body>
</html>
